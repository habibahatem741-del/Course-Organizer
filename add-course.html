<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Organizer</title>
    <link rel="stylesheet" href="sty.css"> </head>
<body>
    
    <main>
    <h2>Add New Courses</h2>
    <form>
        <label>Course Name</label>
        <input type="text" placeholder="enter course name">
        
        <label>Instructor</label>
        <input type="text" placeholder="enter instructor name">
        
        <label>Credit Hours</label>
        <input type="text" placeholder="enter credit hours">
        
        <label>Notes</label>
        <textarea placeholder="enter your notes"></textarea>
        
        <button type="submit">Add Course</button>
    </form>
     
</main>
</body>
